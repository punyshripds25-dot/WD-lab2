<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML5 APIs Demo</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background:#f4f4f4;
        margin:0;
        padding:20px;
        text-align:center;
    }

    h1{
        color:#333;
    }

    .container{
        display:flex;
        justify-content:space-around;
        flex-wrap:wrap;
        margin-top:30px;
    }

    .box{
        background:white;
        padding:20px;
        width:300px;
        margin:10px;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    /* Drag & Drop */
    #dragBox{
        width:100px;
        height:100px;
        background:#4CAF50;
        color:white;
        line-height:100px;
        margin:auto;
        cursor:grab;
        border-radius:10px;
    }

    #dropArea{
        width:200px;
        height:150px;
        border:2px dashed #555;
        margin:20px auto;
        line-height:150px;
        border-radius:10px;
        background:#fafafa;
    }

    button{
        padding:10px 15px;
        margin-top:10px;
        border:none;
        background:#007BFF;
        color:white;
        border-radius:5px;
        cursor:pointer;
    }

    button:hover{
        background:#0056b3;
    }

    input{
        padding:8px;
        width:80%;
        margin-top:10px;
    }

    p{
        color:#333;
    }
</style>
</head>

<body>

<h1>HTML5 APIs Demonstration</h1>

<div class="container">

    <!-- Drag and Drop -->
    <div class="box">
        <h2>Drag & Drop API</h2>

        <div id="dragBox" draggable="true">
            Drag Me
        </div>

        <div id="dropArea">
            Drop Here
        </div>
    </div>

    <!-- Geolocation -->
    <div class="box">
        <h2>Geolocation API</h2>

        <button onclick="getLocation()">
            Get Location
        </button>

        <p id="location"></p>
    </div>

    <!-- Web Storage -->
    <div class="box">
        <h2>Web Storage API</h2>

        <input type="text" id="username" placeholder="Enter Username">

        <br>

        <button onclick="saveData()">
            Save
        </button>

        <button onclick="loadData()">
            Load
        </button>

        <p id="result"></p>
    </div>

</div>

<script>

    /* ---------------- Drag & Drop API ---------------- */

    const dragBox = document.getElementById("dragBox");
    const dropArea = document.getElementById("dropArea");

    dragBox.addEventListener("dragstart", function(event){
        event.dataTransfer.setData("text", event.target.id);
    });

    dropArea.addEventListener("dragover", function(event){
        event.preventDefault();
    });

    dropArea.addEventListener("drop", function(event){
        event.preventDefault();

        const data = event.dataTransfer.getData("text");
        const draggedElement = document.getElementById(data);

        dropArea.innerHTML = "";
        dropArea.appendChild(draggedElement);
    });

    /* ---------------- Geolocation API ---------------- */

    function getLocation(){

        const output = document.getElementById("location");

        if(navigator.geolocation){

            navigator.geolocation.getCurrentPosition(
                
                function(position){

                    output.innerHTML =
                    "Latitude: " + position.coords.latitude +
                    "<br>Longitude: " + position.coords.longitude;

                },

                function(){
                    output.innerHTML = "Location access denied.";
                }

            );

        }else{
            output.innerHTML = "Geolocation not supported.";
        }
    }

    /* ---------------- Web Storage API ---------------- */

    function saveData(){

        const user = document.getElementById("username").value;

        localStorage.setItem("user", user);

        alert("Username Saved!");
    }

    function loadData(){

        const storedUser = localStorage.getItem("user");

        document.getElementById("result").innerHTML =
        "Saved Username: " + storedUser;
    }

</script>

</body>
</html>
