<!DOCTYPE html>
<html>
<head>
    <title>Scholarship Application Form</title>
</head>
<body>

    <h1 align="center">SCHOLARSHIP APPLICATION FORM</h1>
    <hr>

    <form action="#" method="post">

        <h2>Personal Information</h2>

        <label>Full Name:</label><br>
        <input type="text" name="fullname" required><br><br>

        <label>Date of Birth:</label><br>
        <input type="date" name="dob" required><br><br>

        <label>Gender:</label><br>
        <input type="radio" name="gender" value="Male"> Male
        <input type="radio" name="gender" value="Female"> Female
        <input type="radio" name="gender" value="Other"> Other
        <br><br>

        <label>Email:</label><br>
        <input type="email" name="email" required><br><br>

        <label>Phone Number:</label><br>
        <input type="tel" name="phone" required><br><br>

        <label>Address:</label><br>
        <input name="address" name="phone" required><br><br>


        <hr>

        <h2>Educational Details</h2>

        <label>Qualification:</label><br>
        <select name="qualification">
            <option>12th Pass</option>
            <option>Diploma</option>
            <option>Undergraduate</option>
            <option>Postgraduate</option>
        </select>
        <br><br>

        <label>Institution Name:</label><br>
        <input type="text" name="institution"><br><br>

        <label>Percentage / CGPA:</label><br>
        <input type="text" name="marks"><br><br>

        <label>Year of Passing:</label><br>
        <input type="number" name="year"><br><br>

        <hr>

        <h2>Family Details</h2>

        <label>Father's Name:</label><br>
        <input type="text" name="father"><br><br>

        <label>Mother's Name:</label><br>
        <input type="text" name="mother"><br><br>

        <label>Annual Family Income:</label><br>
        <input type="number" name="income"><br><br>

        <hr>

        <h2>Documents Upload</h2>

        <label>Upload Marksheet:</label><br>
        <input type="file" name="marksheet"><br><br>

        <label>Upload Income Certificate:</label><br>
        <input type="file" name="income_certificate"><br><br>

        <hr>

        <h2>Declaration</h2>

        <input type="checkbox" name="declaration" required>
        I hereby declare that the above information is true and correct.
        <br><br>

        <input type="submit" value="Submit Application">
        <input type="reset" value="Reset Form">

    </form>

</body>
</html>
