
 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Indian Festivals</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #fff7ed;
    text-align: center;
    margin: 0;
    padding: 20px;
}

h1 {
    color: #c2410c;
    background: #fed7aa;
    padding: 15px;
    border-radius: 10px;
}

h2 {
    color: #9a3412;
    margin-top: 30px;
}

iframe {
    border: 4px solid #c2410c;
    border-radius: 12px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
    margin-top: 10px;
}

.container {
    background: white;
    padding: 20px;
    margin: 20px auto;
    width: 80%;
    border-radius: 15px;
    box-shadow: 0px 4px 15px rgba(0,0,0,0.15);
}
</style>

</head>
<body>

<h1>Indian Festivals</h1>

<div class="container">
    <h2>Diwali Celebration in Ayodhya</h2>
    <iframe 
    src="https://www.google.com/maps?q=Ayodhya&output=embed" 
    width="600" 
    height="400"
    loading="lazy">
    </iframe>
</div>

<div class="container">
    <h2>Festival Information</h2>
    <iframe 
    src="https://www.britannica.com/topic/Diwali-Hindu-festival" 
    width="600" 
    height="400">
    </iframe>
</div>

</body>
</html>
