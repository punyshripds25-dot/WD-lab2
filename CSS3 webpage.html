<!DOCTYPE html>
<html>
<head>
    <title>Responsive Webpage</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background: #4CAF50;
            color: white;
            text-align: center;
            padding: 15px;
        }

        /* Multiple Columns */
        .content {
            column-count: 3;
            column-gap: 20px;
            padding: 20px;
        }

        /* Box Styling */
        .box {
            background: lightgray;
            padding: 10px;
            margin-bottom: 10px;
            transition: transform 0.5s;
        }

        /* Transformation */
        .box:hover {
            transform: scale(1.1) rotate(5deg);
        }

        /* Animation */
        .animate {
            width: 100px;
            height: 100px;
            background: red;
            margin: 20px auto;
            animation: move 3s infinite;
        }

        @keyframes move {
            0% { transform: translateX(0); }
            50% { transform: translateX(200px); }
            100% { transform: translateX(0); }
        }

        /* Responsive Design */
        @media screen and (max-width: 768px) {
            .content {
                column-count: 1;
            }
        }

        footer {
            text-align: center;
            background: #333;
            color: white;
            padding: 10px;
        }
    </style>
</head>

<body>

<header>
    <h1>My Responsive Webpage</h1>
    <p><i class="fas fa-laptop"></i> CSS3 Features Demo</p>
</header>

<div class="content">
    <div class="box">This is column content 1</div>
    <div class="box">This is column content 2</div>
    <div class="box">This is column content 3</div>
    <div class="box">This is column content 4</div>
    <div class="box">This is column content 5</div>
</div>

<div class="animate"></div>

<footer>
    <p>© 2026 Responsive Design</p>
</footer>

</body>
</html>
